- name: Write to Supabase
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X PATCH \
            "https://iabunyskxepqfussvpwd.supabase.co/rest/v1/keepalive?id=eq.1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"pinged_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}")
          echo "Supabase responded with HTTP $response"
          if [ "$response" -ge 200 ] && [ "$response" -lt 300 ]; then
            echo "Keepalive write successful!"
          else
            echo "Warning: unexpected response code $response"
            exit 1
          fi
