name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 8 */4 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://iabunyskxepqfussvpwd.supabase.co/rest/v1/trucks?select=registration_id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Supabase responded with HTTP $response"
          if [ "$response" -ge 200 ] && [ "$response" -lt 300 ]; then
            echo "Supabase is alive!"
          else
            echo "Warning: unexpected response code $response"
            exit 1
          fi
