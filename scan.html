<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAWMA Fleet — Truck Lookup</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:#F0F4F3; min-height:100vh; }
        .hdr { background:linear-gradient(135deg,#006B3F,#0D9944); color:white; padding:1.25rem; text-align:center; }
        .hdr h1 { font-size:1rem; margin-bottom:0.25rem; }
        .hdr p { font-size:0.8rem; opacity:0.9; }
        .id-bar { background:#004D2D; color:#7DFFB5; text-align:center; padding:1rem; font-size:1.5rem; font-weight:bold; letter-spacing:2px; }
        .id-bar small { display:block; font-size:0.7rem; color:rgba(255,255,255,0.6); font-weight:normal; letter-spacing:0; margin-top:0.25rem; }
        .status-bar { display:flex; justify-content:center; padding:0.75rem; gap:0.5rem; flex-wrap:wrap; }
        .badge { padding:0.35rem 0.75rem; border-radius:20px; font-size:0.75rem; font-weight:600; }
        .b-active { background:#D4EDDA; color:#155724; }
        .b-grounded { background:#F8D7DA; color:#721C24; }
        .b-verified { background:#D1ECF1; color:#0C5460; }
        .card { background:white; margin:0.75rem; border-radius:12px; overflow:hidden; border:1px solid #E8ECEB; }
        .card-t { padding:0.75rem 1rem; background:#F8FAF9; border-bottom:1px solid #E8ECEB; font-size:0.8rem; font-weight:600; color:#006B3F; text-transform:uppercase; letter-spacing:0.5px; }
        .row { display:flex; justify-content:space-between; align-items:center; padding:0.65rem 1rem; border-bottom:1px solid #F0F2F1; }
        .row:last-child { border-bottom:none; }
        .row-l { font-size:0.82rem; color:#6B7B75; }
        .row-v { font-size:0.82rem; font-weight:500; color:#2C3E50; text-align:right; max-width:55%; }
        .ok { color:#27AE60; } .warn { color:#E67E22; } .bad { color:#E74C3C; }
        .foot { text-align:center; padding:1rem; font-size:0.7rem; color:#999; }
        .loading { text-align:center; padding:3rem 1rem; }
        .loading .spinner { width:40px; height:40px; border:3px solid #E8ECEB; border-top:3px solid #006B3F; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 1rem; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .loading p { color:#6B7B75; font-size:0.9rem; }
        .error-box { text-align:center; padding:3rem 1rem; }
        .error-box .icon { font-size:3rem; margin-bottom:1rem; }
        .error-box h2 { font-size:1.1rem; color:#2C3E50; margin-bottom:0.5rem; }
        .error-box p { font-size:0.85rem; color:#6B7B75; line-height:1.5; }
        .search-box { margin:1rem 0.75rem; }
        .search-box input { width:100%; padding:0.75rem 1rem; border:1px solid #E8ECEB; border-radius:8px; font-size:0.9rem; outline:none; }
        .search-box input:focus { border-color:#006B3F; box-shadow:0 0 0 2px rgba(0,107,63,0.1); }
        .search-box button { width:100%; margin-top:0.5rem; padding:0.75rem; background:#006B3F; color:white; border:none; border-radius:8px; font-size:0.9rem; font-weight:600; cursor:pointer; }
        .search-box button:hover { background:#005533; }
    </style>
</head>
<body>
    <div class="hdr">
        <h1>Lagos Waste Management Authority</h1>
        <p>Fleet Revalidation & Digital Coding System</p>
    </div>

    <div id="content">
        <div class="loading">
            <div class="spinner"></div>
            <p>Looking up truck details...</p>
        </div>
    </div>

    <div class="foot">
        GreenTalk Fleet Revalidation System &bull; Powered by GreenTalk
    </div>

    <script>
        const SUPABASE_URL = 'https://iabunyskxepqfussvpwd.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_pVMZnYSkWFnrFWGbKeWBHg_0YiicplF';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const content = document.getElementById('content');

        // Get truck ID from URL
        const params = new URLSearchParams(window.location.search);
        const truckId = params.get('id');

        if (!truckId) {
            showSearch();
        } else {
            lookupTruck(truckId);
        }

        function showSearch() {
            content.innerHTML = `
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Enter truck registration ID (e.g. LAWMA-PSP-0001-AB3F)" />
                    <button onclick="doSearch()">Look Up Truck</button>
                </div>
                <div class="error-box">
                    <div class="icon" style="font-size:2rem; color:#006B3F;">&#128269;</div>
                    <h2>Scan a QR code or enter an ID</h2>
                    <p>Scan a truck's QR sticker with your phone camera, or manually enter the truck registration ID above.</p>
                </div>
            `;
        }

        function doSearch() {
            const val = document.getElementById('search-input').value.trim();
            if (val) {
                window.location.href = '?id=' + encodeURIComponent(val);
            }
        }

        async function lookupTruck(regId) {
            document.title = 'LAWMA Fleet — ' + regId;

            try {
                // Fetch truck
                const { data: truck, error: tErr } = await sb
                    .from('trucks')
                    .select('*')
                    .eq('registration_id', regId)
                    .single();

                if (tErr || !truck) {
                    showNotFound(regId);
                    return;
                }

                // Fetch operator
                const { data: op, error: oErr } = await sb
                    .from('psp_operators')
                    .select('*')
                    .eq('id', truck.operator_id)
                    .single();

                showResult(truck, op);

            } catch (err) {
                content.innerHTML = `
                    <div class="error-box">
                        <div class="icon">&#9888;</div>
                        <h2>Connection Error</h2>
                        <p>Could not connect to the database. Please check your internet connection and try again.</p>
                    </div>
                `;
            }
        }

        function showNotFound(regId) {
            content.innerHTML = `
                <div class="id-bar" style="color:#FF8A8A;">${regId}<small>Not found in database</small></div>
                <div class="error-box">
                    <div class="icon">&#10060;</div>
                    <h2>Truck Not Found</h2>
                    <p>No truck with this registration ID was found in the LAWMA fleet database. This could mean the truck is not yet registered or the QR code is invalid.</p>
                </div>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Try another ID..." />
                    <button onclick="doSearch()">Look Up</button>
                </div>
            `;
        }

        function showResult(truck, op) {
            const isReg = truck.is_registered;
            const idLabel = isReg ? 'Registration No.' : 'Chassis No.';
            const idValue = isReg ? truck.vehicle_reg_number : truck.chassis_number;
            const make = truck.make === 'Other' ? (truck.make_other || 'Other') : truck.make;
            const type = truck.vehicle_type === 'Other' ? (truck.vehicle_type_other || 'Other') : truck.vehicle_type;
            const ownership = truck.ownership_status === 'Other' ? (truck.ownership_other || 'Other') : truck.ownership_status;
            const isActive = truck.operational_status === 'Active';
            const insDisplay = truck.insurance_status === 'None' ? 'None' : (truck.insurance_type || truck.insurance_status);
            const insClass = truck.insurance_status === 'None' ? 'bad' : 'ok';

            let html = `
                <div class="id-bar">${truck.registration_id}<small>Scanned at ${new Date().toLocaleString()}</small></div>
                <div class="status-bar">
                    <span class="badge ${isActive ? 'b-active' : 'b-grounded'}">${truck.operational_status || 'Unknown'}</span>
                    <span class="badge b-verified">LAWMA Verified</span>
                </div>

                <div class="card">
                    <div class="card-t">Vehicle Information</div>
                    <div class="row"><span class="row-l">${idLabel}</span><span class="row-v">${idValue || 'N/A'}</span></div>
                    <div class="row"><span class="row-l">Vehicle Type</span><span class="row-v">${type || 'N/A'}</span></div>
                    <div class="row"><span class="row-l">Make</span><span class="row-v">${make || 'N/A'}</span></div>
                    ${truck.number_of_tyres ? `<div class="row"><span class="row-l">Tyres</span><span class="row-v">${truck.number_of_tyres}</span></div>` : ''}
                    <div class="row"><span class="row-l">Ownership</span><span class="row-v">${ownership || 'N/A'}</span></div>
                    <div class="row"><span class="row-l">Insurance</span><span class="row-v ${insClass}">${insDisplay || 'N/A'}</span></div>
                </div>
            `;

            if (op) {
                html += `
                    <div class="card">
                        <div class="card-t">PSP Operator</div>
                        <div class="row"><span class="row-l">Company</span><span class="row-v">${op.company_name}</span></div>
                        <div class="row"><span class="row-l">Contact</span><span class="row-v">${op.contact_person}</span></div>
                        <div class="row"><span class="row-l">Phone</span><span class="row-v"><a href="tel:${op.phone}" style="color:#006B3F;text-decoration:none;">${op.phone}</a></span></div>
                        <div class="row"><span class="row-l">Email</span><span class="row-v" style="font-size:0.78rem;">${op.email}</span></div>
                        <div class="row"><span class="row-l">LGA</span><span class="row-v">${op.lga}</span></div>
                        ${op.ward ? `<div class="row"><span class="row-l">Ward</span><span class="row-v">${op.ward}</span></div>` : ''}
                        <div class="row"><span class="row-l">Fleet Size</span><span class="row-v">${op.fleet_size} truck(s)</span></div>
                    </div>
                `;
            }

            html += `
                <div class="card">
                    <div class="card-t">Registration Details</div>
                    <div class="row"><span class="row-l">Registered</span><span class="row-v">${new Date(truck.created_at).toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' })}</span></div>
                    <div class="row"><span class="row-l">Truck #</span><span class="row-v">${truck.truck_index} of ${op ? op.fleet_size : '?'}</span></div>
                </div>
            `;

            content.innerHTML = html;
        }
    </script>
</body>
</html>
